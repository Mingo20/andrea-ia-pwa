<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Andrea IA" />
  <meta name="description" content="Andrea IA - Tu asistente inteligente" />
  <title>Andrea IA</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --bg3: #252525;
      --accent: #39ff14;
      --accent-glow: rgba(57,255,20,0.35);
      --text: #ffffff;
      --text2: #aaaaaa;
      --user-bubble: #1e3a1e;
      --agent-bubble: #1e1e1e;
      --border: #2a2a2a;
      --input-bg: #1c1c1c;
      --send-btn: #39ff14;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    /* Avatar sin anillo verde */
    .header-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg3);
    }
    .header-info { flex: 1; }
    .header-name { font-weight: 600; font-size: 15px; }
    .header-status { font-size: 12px; color: var(--accent); display: flex; align-items: center; gap: 4px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .header-actions { display: flex; gap: 8px; }
    .header-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--bg3);
      border: none;
      color: var(--text2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .header-btn:hover { background: var(--bg2); color: var(--text); }
    .header-btn svg { width: 18px; height: 18px; }

    /* ── CHAT AREA ── */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }
    .chat-container::-webkit-scrollbar { width: 3px; }
    .chat-container::-webkit-scrollbar-track { background: transparent; }
    .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── WELCOME ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100dvh - 140px);
      padding: 32px 16px;
      text-align: center;
      gap: 16px;
    }
    .welcome-avatar-wrap {
      position: relative;
      width: 110px; height: 110px;
    }
    /* Glow solo como sombra difusa — sin anillos ni bordes verdes */
    .welcome-avatar-glow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      box-shadow: 0 0 32px var(--accent-glow);
      pointer-events: none;
      animation: glowPulse 3s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100%{ box-shadow: 0 0 20px var(--accent-glow); }
      50%{ box-shadow: 0 0 45px var(--accent-glow); }
    }
    .welcome-avatar {
      width: 110px; height: 110px;
      border-radius: 50%;
      object-fit: cover;
      position: relative;
      z-index: 1;
    }
    .welcome-title { font-size: 26px; font-weight: 700; margin-top: 8px; }
    .welcome-title span { color: var(--accent); }
    .welcome-subtitle { font-size: 14px; color: var(--text2); max-width: 280px; line-height: 1.6; }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 8px;
      max-width: 340px;
    }
    .suggestion-btn {
      padding: 10px 16px;
      border-radius: 22px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .suggestion-btn:hover { background: var(--bg2); border-color: var(--accent); color: var(--accent); }
    .suggestion-btn .icon { display: flex; align-items: center; }
    .suggestion-btn svg { width: 15px; height: 15px; }

    /* ── MESSAGES ── */
    .message-group { margin-top: 16px; display: flex; flex-direction: column; gap: 3px; }
    .message-row { display: flex; align-items: flex-end; gap: 8px; }
    .message-row.user { flex-direction: row-reverse; }
    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.55;
      word-break: break-word;
    }
    .bubble.user {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
      color: var(--text);
      border: 1px solid rgba(57,255,20,0.2);
    }
    .bubble.agent {
      background: var(--agent-bubble);
      border-bottom-left-radius: 4px;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .bubble-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .message-time {
      font-size: 10px;
      color: var(--text2);
      padding: 0 4px;
      text-align: right;
    }
    .message-row.user .message-time { text-align: left; }

    /* ── TYPING ── */
    .typing {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 0 4px;
    }
    .typing-dots {
      background: var(--agent-bubble);
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      display: flex; gap: 4px; align-items: center;
    }
    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.4s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── INPUT AREA — fondo gris claro ── */
    .input-area {
      padding: 10px 12px 20px;
      background: #e0e0e0;
      border-top: 1px solid #cccccc;
      flex-shrink: 0;
    }
    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: #ffffff;
      border: 1px solid #c8c8c8;
      border-radius: 26px;
      padding: 8px 8px 8px 16px;
      transition: border-color 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    #messageInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #111111;
      font-size: 15px;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
    }
    #messageInput::placeholder { color: #888888; }
    .input-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .attach-btn, .mic-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: #555555;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .attach-btn svg, .mic-btn svg { width: 20px; height: 20px; }
    .attach-btn:hover, .mic-btn:hover { color: #111; background: rgba(0,0,0,0.07); }
    .mic-btn.recording { color: #ff4444; animation: micPulse 1s infinite; }
    @keyframes micPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
    .send-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--send-btn);
      border: none;
      color: #000;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .send-btn svg { width: 18px; height: 18px; }
    .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent-glow); }
    .send-btn:active { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── RECORDING BANNER ── */
    .recording-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.3);
      border-radius: 12px;
      margin-bottom: 8px;
      font-size: 13px;
      color: #ff6666;
    }
    .recording-banner.active { display: flex; }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4444; animation: micPulse 1s infinite; }

    /* ── MARKDOWN ── */
    .bubble.agent p { margin-bottom: 6px; }
    .bubble.agent p:last-child { margin-bottom: 0; }
    .bubble.agent ul, .bubble.agent ol { padding-left: 18px; margin: 6px 0; }
    .bubble.agent li { margin-bottom: 3px; }
    .bubble.agent code {
      background: rgba(57,255,20,0.1);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
      color: var(--accent);
    }
    .bubble.agent pre {
      background: #111;
      border-radius: 8px;
      padding: 10px;
      overflow-x: auto;
      margin: 6px 0;
    }
    .bubble.agent pre code { background: none; padding: 0; }
    .bubble.agent strong { color: var(--accent); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const CONFIG = {
  apiKey: 'ebf1c9d7746048b2b3bfdb928b7db6a2',
  appId: '69ff4795c5927c8f49974e4b',
  baseUrl: 'https://app.base44.com/api/agents/69ff4795c5927c8f49974e4b',
  agentAvatar: 'icon-192.png'
};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let conversationId = null;
let messages = [];
let isTyping = false;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let darkMode = true;

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  loadFromStorage();
  setupTextarea();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(console.warn);
  }
});

function loadFromStorage() {
  const saved = localStorage.getItem('andrea_conversation');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      conversationId = data.conversationId;
      messages = data.messages || [];
      if (messages.length > 0) {
        hideWelcome();
        messages.forEach(m => renderMessage(m.role, m.content, m.time, false));
        scrollToBottom();
      }
    } catch(e) {}
  }
}

function saveToStorage() {
  localStorage.setItem('andrea_conversation', JSON.stringify({
    conversationId,
    messages: messages.slice(-50)
  }));
}

// ═══════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════
function hideWelcome() {
  const w = document.getElementById('welcomeScreen');
  if (w) w.style.display = 'none';
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function getTime() {
  return new Date().toLocaleTimeString('es-DO', { hour: '2-digit', minute: '2-digit' });
}

function scrollToBottom() {
  const c = document.getElementById('chatContainer');
  setTimeout(() => c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' }), 50);
}

function setupTextarea() {
  const input = document.getElementById('messageInput');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderMessage(role, content, time, save = true) {
  const container = document.getElementById('chatContainer');
  const t = time || getTime();

  const group = document.createElement('div');
  group.className = 'message-group';

  const row = document.createElement('div');
  row.className = 'message-row ' + role;

  if (role === 'agent') {
    const avatar = document.createElement('img');
    avatar.src = CONFIG.agentAvatar;
    avatar.className = 'bubble-avatar';
    row.appendChild(avatar);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.innerHTML = role === 'agent' ? parseMarkdown(content) : escapeHtml(content);
  row.appendChild(bubble);
  group.appendChild(row);

  const timeEl = document.createElement('div');
  timeEl.className = 'message-time';
  timeEl.textContent = t;
  group.appendChild(timeEl);

  container.appendChild(group);
  scrollToBottom();

  if (save) {
    messages.push({ role, content, time: t });
    saveToStorage();
  }
}

function parseMarkdown(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^#{1,3} (.+)$/gm,'<strong>$1</strong>')
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>');
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════════
// TYPING
// ═══════════════════════════════════════════════
function showTyping() {
  const container = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  const avatar = document.createElement('img');
  avatar.src = CONFIG.agentAvatar;
  avatar.className = 'bubble-avatar';
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';
  div.appendChild(avatar);
  div.appendChild(dots);
  container.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

// ═══════════════════════════════════════════════
// SEND
// ═══════════════════════════════════════════════
function sendSuggestion(text) {
  document.getElementById('messageInput').value = text;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text || isTyping) return;

  hideWelcome();
  input.value = '';
  input.style.height = 'auto';
  renderMessage('user', text);

  isTyping = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const response = await callAgentAPI(text);
    hideTyping();
    renderMessage('agent', response);
  } catch (err) {
    hideTyping();
    renderMessage('agent', '⚠️ No pude conectarme. Verifica tu API key o intenta de nuevo.');
    console.error(err);
  } finally {
    document.getElementById('sendBtn').disabled = false;
    isTyping = false;
  }
}

// ═══════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════
async function callAgentAPI(message) {
  const headers = {
    'Content-Type': 'application/json',
    'api_key': CONFIG.apiKey
  };

  // Siempre usar conversación fija del owner
  if (!conversationId) {
    conversationId = '69ff4798777455158dc74b38';
  }

  // Contar mensajes actuales antes de enviar (para detectar respuesta nueva)
  let prevCount = 0;
  try {
    const prevRes = await fetch(CONFIG.baseUrl + '/conversations/' + conversationId, { headers });
    if (prevRes.ok) {
      const prevData = await prevRes.json();
      prevCount = (prevData?.messages || []).filter(m => m.role === 'assistant' || m.role === 'agent').length;
    }
  } catch(e) {}

  // Enviar mensaje del usuario
  const res = await fetch(CONFIG.baseUrl + '/conversations/' + conversationId + '/messages', {
    method: 'POST',
    headers,
    body: JSON.stringify({ role: 'user', content: message.trim() })
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error('API Error ' + res.status + ': ' + err);
  }

  // Polling: esperar que aparezca un nuevo mensaje del assistant
  for (let i = 0; i < 20; i++) {
    await new Promise(r => setTimeout(r, 2500));
    try {
      const convRes = await fetch(CONFIG.baseUrl + '/conversations/' + conversationId, { headers });
      if (!convRes.ok) continue;
      const convData = await convRes.json();
      const assistants = (convData?.messages || []).filter(m => m.role === 'assistant' || m.role === 'agent');
      if (assistants.length > prevCount) {
        const last = assistants[assistants.length - 1];
        const content = last?.content;
        if (content && typeof content === 'string' && content.trim()) {
          return content;
        }
      }
    } catch(e) { /* continuar */ }
  }

  return 'Espera un momento, sigo procesando tu mensaje...';
}

// ═══════════════════════════════════════════════
// MIC
// ═══════════════════════════════════════════════
function setMicIcon(recording) {
  document.getElementById('micIconUse').setAttribute('href', recording ? '#ic-mic-stop' : '#ic-mic');
  document.getElementById('micBtn').classList.toggle('recording', recording);
}

window.toggleRecording = async function() {
  if (!isRecording) {
    const used = startSpeechRecognition();
    if (!used) await startRecording();
  } else {
    if (!(window.SpeechRecognition || window.webkitSpeechRecognition)) stopRecording();
  }
};

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: getSupportedMimeType() });
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      await transcribeAudio(new Blob(audioChunks, { type: mediaRecorder.mimeType }));
    };
    mediaRecorder.start(250);
    isRecording = true;
    setMicIcon(true);
    document.getElementById('recordingBanner').classList.add('active');
  } catch(err) { showToast('No se pudo acceder al micrófono'); }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  setMicIcon(false);
  document.getElementById('recordingBanner').classList.remove('active');
  showToast('Procesando audio...');
}

function getSupportedMimeType() {
  for (const t of ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4']) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

async function transcribeAudio(audioBlob) {
  try {
    const fd = new FormData();
    fd.append('file', audioBlob, 'recording.webm');
    const res = await fetch(CONFIG.baseUrl + '/transcribe', { method:'POST', headers:{'ApiKey':CONFIG.apiKey}, body:fd });
    if (res.ok) {
      const d = await res.json();
      const tr = d.text || d.transcript || '';
      if (tr) { document.getElementById('messageInput').value = tr; showToast('✓ Audio transcrito'); }
    }
  } catch(e) { showToast('Error al transcribir audio'); }
}

function startSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;
  const r = new SR();
  r.lang = 'es-DO'; r.continuous = false; r.interimResults = true;
  r.onstart = () => { isRecording = true; setMicIcon(true); document.getElementById('recordingBanner').classList.add('active'); };
  r.onresult = e => { document.getElementById('messageInput').value = Array.from(e.results).map(x=>x[0].transcript).join(''); };
  r.onend = () => {
    isRecording = false; setMicIcon(false);
    document.getElementById('recordingBanner').classList.remove('active');
    const txt = document.getElementById('messageInput').value.trim();
    if (txt) sendMessage();
  };
  r.onerror = () => { isRecording = false; setMicIcon(false); document.getElementById('recordingBanner').classList.remove('active'); };
  r.start();
  return true;
}

// FILE ATTACH
document.getElementById('fileInput').addEventListener('change', e => {

  if (!f) return;
  showToast('Adjunto: ' + f.name);

  inp.value = inp.value ? inp.value + ' [Archivo: ' + f.name + ']' : '[Archivo: ' + f.name + ']';
});
